name: KanjiJourney
options:
  bundleIdPrefix: com.jworks.kanjijourney
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "25"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "2"  # iPad only

configs:
  Debug: debug
  Release: release

targets:
  KanjiJourney:
    type: application
    platform: iOS
    configFiles:
      Debug: KanjiJourney.xcconfig
      Release: KanjiJourney.xcconfig

    sources:
      - path: KanjiJourney
        excludes:
          - "**/.DS_Store"
      - path: kanjijourney.db
        buildPhase: resources

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jworks.kanjijourney.ipad
        INFOPLIST_FILE: KanjiJourney/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "2"  # iPad only
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        FRAMEWORK_SEARCH_PATHS: $(PROJECT_DIR)/Frameworks
        SWIFT_OBJC_BRIDGING_HEADER: KanjiJourney/KanjiJourney-Bridging-Header.h
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
        SUPABASE_SERVICE_ROLE_KEY: $(SUPABASE_SERVICE_ROLE_KEY)
        GEMINI_API_KEY: $(GEMINI_API_KEY)
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: -Onone
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG IPAD_TARGET
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: IPAD_TARGET

    dependencies:
      - framework: $(PROJECT_DIR)/Frameworks/SharedCore.xcframework
        embed: true
      - framework: $(PROJECT_DIR)/Frameworks/SharedJapanese.xcframework
        embed: true
      - sdk: libsqlite3.tbd

    preBuildScripts:
      - name: "Stage Database"
        script: |
          # Copy pre-built kanji database to project dir for resource bundling
          DB_DEST="${PROJECT_DIR}/kanjijourney.db"
          DB_SRC="${PROJECT_DIR}/../android-app/src/main/assets/kanjijourney.db"
          if [ ! -f "$DB_DEST" ] && [ -f "$DB_SRC" ]; then
            cp "$DB_SRC" "$DB_DEST"
          fi
        basedOnDependencyAnalysis: false

      - name: "Link SharedCore XCFramework"
        script: |
          # Copy XCFramework to local Frameworks/ if not present
          DEST="${PROJECT_DIR}/Frameworks/SharedCore.xcframework"
          SRC="${PROJECT_DIR}/../shared-core/build/XCFrameworks/release/SharedCore.xcframework"
          if [ ! -d "$DEST" ] && [ -d "$SRC" ]; then
            mkdir -p "${PROJECT_DIR}/Frameworks"
            cp -R "$SRC" "$DEST"
          elif [ ! -d "$DEST" ]; then
            cd "${PROJECT_DIR}/.."
            ./gradlew :shared-core:assembleSharedCoreReleaseXCFramework
            mkdir -p "${PROJECT_DIR}/Frameworks"
            cp -R "$SRC" "$DEST"
          fi
        basedOnDependencyAnalysis: false

  KanjiJourneyTests:
    type: bundle.unit-test
    platform: iOS

    sources:
      - path: KanjiJourneyTests

    dependencies:
      - target: KanjiJourney

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jworks.kanjijourney.ipad.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KanjiJourney.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/KanjiJourney"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KanjiJourneyUITests:
    type: bundle.ui-testing
    platform: iOS

    sources:
      - path: KanjiJourneyUITests

    dependencies:
      - target: KanjiJourney

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jworks.kanjijourney.ipad.uitests
        TEST_TARGET_NAME: KanjiJourney

schemes:
  KanjiJourney:
    build:
      targets:
        KanjiJourney: all
        KanjiJourneyTests: [test]
        KanjiJourneyUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - KanjiJourneyTests
        - KanjiJourneyUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release


